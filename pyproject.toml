[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[project]
name = "rex-intelligence-platform"
version = "0.1.0"
description = "Enterprise-grade AI Operating System with LINE as Gateway"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "Rex Intelligence Platform Team", email = "dev@example.com"}
]
keywords = [
    "ai", "nlp", "line-bot", "workflow", "claude", "gpt", "gemini",
    "pdf", "github", "aws", "multi-agent"
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Enterprises",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.urls]
Repository = "https://github.com/xxx/rex-intelligence-platform"
Documentation = "https://docs.example.com"
Issues = "https://github.com/xxx/rex-intelligence-platform/issues"
Changelog = "https://github.com/xxx/rex-intelligence-platform/releases"

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "pytest-asyncio>=0.21.0",
    "pytest-mock>=3.11.0",
    "black>=23.7.0",
    "isort>=5.12.0",
    "flake8>=6.0.0",
    "mypy>=1.4.0",
    "pylint>=2.17.0",
]

testing = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "pytest-asyncio>=0.21.0",
    "pytest-mock>=3.11.0",
    "responses>=0.23.0",
]

monitoring = [
    "prometheus-client>=0.17.0",
    "python-json-logger>=2.0.0",
]

[tool.poetry]
name = "rex-intelligence-platform"
version = "0.1.0"
description = "Enterprise-grade AI Operating System with LINE as Gateway"
authors = ["Rex Intelligence Platform Team <dev@example.com>"]
readme = "README.md"
license = "MIT"
repository = "https://github.com/xxx/rex-intelligence-platform"
packages = [
    {include = "src"}
]

[tool.poetry.dependencies]
python = "^3.11"

# Web Framework
fastapi = "^0.100.0"
uvicorn = {version = "^0.23.0", extras = ["standard"]}
pydantic = "^2.0"
pydantic-settings = "^2.0"

# Async & Concurrency
aiohttp = "^3.8.5"
asyncpg = "^0.28.0"
aioredis = "^2.0.1"

# Database
sqlalchemy = "^2.0"
alembic = "^1.11.0"
psycopg2-binary = "^2.9.7"

# Message Queue & Caching
redis = "^5.0.0"
celery = "^5.3.0"  # Optional, for task queue

# External APIs
anthropic = "^0.7.0"  # Claude
openai = "^0.28.0"    # GPT
google-generativeai = "^0.3.0"  # Gemini
line-bot-sdk = "^3.5.0"

# Data Processing
PyPDF2 = "^3.0.0"
pdfplumber = "^0.10.0"
python-pptx = "^0.6.21"
pillow = "^10.0.0"
pytesseract = "^0.3.10"

# GitHub Integration
pygithub = "^1.59.0"
gitpython = "^3.1.32"

# AWS Integration
boto3 = "^1.28.0"
botocore = "^1.31.0"

# Google Integration
google-auth = "^2.22.0"
google-auth-httplib2 = "^0.1.1"
google-api-python-client = "^2.95.0"
google-cloud-storage = "^2.10.0"

# Logging & Monitoring
loguru = "^0.7.0"
python-json-logger = "^2.0.0"
prometheus-client = "^0.17.0"

# Configuration
python-dotenv = "^1.0.0"
pyyaml = "^6.0"

# Utilities
pydantic-core = "^2.0"
httpx = "^0.24.0"
tenacity = "^8.2.3"  # Retry logic
python-dateutil = "^2.8.2"
pytz = "^2023.3"

# Development
black = {version = "^23.7.0", optional = true}
isort = {version = "^5.12.0", optional = true}
flake8 = {version = "^6.0.0", optional = true}
mypy = {version = "^1.4.0", optional = true}
pylint = {version = "^2.17.0", optional = true}
pytest = {version = "^7.4.0", optional = true}
pytest-cov = {version = "^4.1.0", optional = true}
pytest-asyncio = {version = "^0.21.0", optional = true}
pytest-mock = {version = "^3.11.0", optional = true}
responses = {version = "^0.23.0", optional = true}

[tool.poetry.extras]
dev = [
    "black",
    "isort",
    "flake8",
    "mypy",
    "pylint",
    "pytest",
    "pytest-cov",
    "pytest-asyncio",
    "pytest-mock",
    "responses",
]

[tool.poetry.scripts]
rip = "src.cli:main"

[tool.black]
line-length = 100
target-version = ["py311"]
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
  | migrations
)/
'''

[tool.isort]
profile = "black"
multi_line_mode = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
line_length = 100
skip_glob = ["*/migrations/*"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false  # Can be set to true for stricter checking
disallow_incomplete_defs = false
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
strict_equality = true

[[tool.mypy.overrides]]
module = [
    "anthropic.*",
    "openai.*",
    "google.*",
    "line.*",
    "PyPDF2.*",
    "pdfplumber.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
minversion = "7.4"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
    "--disable-warnings",
]
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "performance: Performance tests",
    "slow: Slow running tests",
    "asyncio: Async tests",
]

[tool.coverage.run]
source = ["src"]
branch = true
omit = [
    "*/tests/*",
    "*/__init__.py",
    "*/migrations/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "class .*\\(Protocol\\):",
    "@abstractmethod",
    "if self.debug:",
    "if settings.DEBUG:",
]
precision = 2
show_missing = true
skip_covered = false

[tool.coverage.html]
directory = "coverage_html_report"

[tool.pylint.main]
jobs = 4
limit-inference-results = 100
persistent = true
unsafe-load-any-extension = false

[tool.pylint.messages_control]
disable = [
    "C0103",  # invalid-name
    "C0111",  # missing-docstring
    "C0302",  # too-many-lines
    "R0913",  # too-many-arguments
    "R0914",  # too-many-locals
    "W0212",  # protected-access
]

[tool.pylint.format]
max-line-length = 100
indent-string = "    "

[tool.pylint.design]
max-args = 7
max-locals = 20
max-branches = 15
max-statements = 60

[tool.pylint.similarities]
ignore-comments = true
ignore-docstrings = true
min-similarity-lines = 4

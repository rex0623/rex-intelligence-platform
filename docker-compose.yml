version: '3.8'

services:
  # RIP API Gateway & Router
  rip-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rip-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=INFO
      - HOST=0.0.0.0
      - PORT=8000
      - LINE_CHANNEL_ID=${LINE_CHANNEL_ID:-}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET:-}
      - LINE_ACCESS_TOKEN=${LINE_ACCESS_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/rip_dev
    depends_on:
      - redis
      - postgres
    networks:
      - rip-network
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Redis Cache & Message Queue
  redis:
    image: redis:7-alpine
    container_name: rip-redis
    ports:
      - "6379:6379"
    networks:
      - rip-network
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: rip-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=rip_dev
    networks:
      - rip-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  rip-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:

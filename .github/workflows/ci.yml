name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: pytest (Python 3.12, ubuntu-22.04)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry 2.4.1
        run: pip install "poetry==2.4.1"

      - name: Configure Poetry virtualenv
        run: poetry config virtualenvs.in-project true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-py3.12-

      - name: Install dependencies
        run: poetry install

      - name: poetry check
        run: poetry check

      - name: Run tests
        run: poetry run pytest -q

      - name: CLI smoke (rip help)
        run: poetry run rip "說明"

      - name: Build package
        run: poetry build
